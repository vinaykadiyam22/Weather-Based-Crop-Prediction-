services:
  # Single Full-Stack Service - Backend serves both API + React Frontend
  - type: web
    name: smart-crop-advisory
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt && cd frontend && npm install && npm run build
    startCommand: cd backend && python -m uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: DATABASE_URL
        value: sqlite:///./crop_advisory.db
